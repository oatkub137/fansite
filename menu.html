<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Menu 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    font-family:'Kanit', sans-serif;
    background: linear-gradient(180deg,#ffe6f0,#ffe6f0);
    text-align:center;
  }

  h1{
    margin-top:40px;
    color:#555;
    font-weight:600;
  }

  .menu-grid{
    display:grid;
    grid-template-columns:repeat(2, 180px);
    gap:25px;
    justify-content:center;
    margin-top:40px;
  }

  .menu-btn{
    height:180px;
    border-radius:25px;
    border:none;
    background: linear-gradient(145deg,#ff8fb1,#ff6f9c);
    color:white;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 20px rgba(255,105,135,0.3);
    transition:0.2s;
    font-family:'Kanit', sans-serif;
  }

  .menu-btn:hover{
    transform:scale(1.05);
  }

  .icon{
    font-size:40px;
    margin-bottom:10px;
  }</style>
</head>
<body>

<h1>เลือกเมนู</h1>

<div class="menu-grid">
  <button class="menu-btn" onclick="location.href='love.html'">
    <div class="icon">🍒</div>
    เราคบกันมานาน
    เท่าไหร่แล้วนะ
  </button>

  <button class="menu-btn" onclick="location.href='letter.html'">
    <div class="icon">🐰</div>
    จดหมาย
    ถึงคนน่ารัก
  </button>

  <button class="menu-btn" onclick="location.href='quiz.html'">
    <div class="icon">🧁</div>
    เรารู้ใจกัน
    มากแค่ไหน
  </button>

  <button class="menu-btn" onclick="location.href='blog.html'">
    <div class="icon">📷</div>
    ความทรงจำ
  </button>
</div>

</body>
</html>
