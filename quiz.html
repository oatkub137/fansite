<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="icon" type="image/png" href="img/tom.png">
<meta charset="UTF-8">
<title>คำถามรู้ใจ 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    font-family:'Kanit', sans-serif;
    background: linear-gradient(180deg,#fff0f5,#ffe6f0);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }

  .card{
    width:90%;
    max-width:420px;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(255,105,135,0.2);
  }

  h1{
    text-align:center;
    color:#ff6f9c;
  }

  .question{
    margin:15px 0;
  }

  button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:20px;
    background: linear-gradient(145deg,#ff8fb1,#ff6f9c);
    color:white;
    font-size:18px;
    cursor:pointer;
  }

  #result{
    margin-top:15px;
    text-align:center;
    color:#ff6f9c;
    font-weight:600;
  }</style>
</head>
<body>

<div class="card">
  <h1>💖 คำถามรู้ใจ 💖</h1>

  <div class="question">
    1. เราชอบสีอะไร?<br>
    <input type="radio" name="q1" value="a"> สีแดง
    <input type="radio" name="q1" value="b"> สีชมพู
    <input type="radio" name="q1" value="c"> สีเขียว
    <input type="radio" name="q1" value="d"> สีน้ำเงิน
  </div>

  <div class="question">
    2. เราชอบกินอะไร?<br>
    <input type="radio" name="q2" value="a"> ชาบู
    <input type="radio" name="q2" value="b"> หมูกระทะ
    <input type="radio" name="q2" value="c"> อาหารตามสั่ง
    <input type="radio" name="q2" value="d"> อาหารทะเล
  </div>

  <div class="question">
    3. เราชอบไปเที่ยวที่ไหน?<br>
    <input type="radio" name="q3" value="a"> ทะเล
    <input type="radio" name="q3" value="b"> ภูเขา
    <input type="radio" name="q3" value="c"> สวนน้ำ
    <input type="radio" name="q3" value="d"> สวนสัตว์
  </div>

  <div class="question">
    4. เราชอบดูหนังแนวไหน?<br>
    <input type="radio" name="q4" value="a"> โรแมนติก
    <input type="radio" name="q4" value="b"> สยองขวัญ
    <input type="radio" name="q4" value="c"> ตลก
    <input type="radio" name="q4" value="d"> ไซไฟ
  </div>

  <div class="question">
    5. เรารักใครที่สุด?<br>
    <input type="radio" name="q5" value="a"> เธอ ❤️
    <input type="radio" name="q5" value="b"> คนอื่น 😡
  </div>

  <button onclick="checkScore()">ยืนยันคำตอบ</button>

  <div id="result"></div>
</div>

<script>
function checkScore(){
  let score = 0;

  if(document.querySelector('input[name="q1"]:checked')?.value==='c') score++;
  if(document.querySelector('input[name="q2"]:checked')?.value==='b') score++;
  if(document.querySelector('input[name="q3"]:checked')?.value==='a') score++;
  if(document.querySelector('input[name="q4"]:checked')?.value==='d') score++;
  if(document.querySelector('input[name="q5"]:checked')?.value==='a') score++;

  document.getElementById('result').innerText = 'ได้คะแนน ' + score + ' / 5 💕';
}
</script>

</body>
</html>
