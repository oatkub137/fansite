<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Our Memory ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Blog บันทึกของเรา ❤️</h1>
    </header>

    <main id="blogContainer">
        <div id="blogList"></div>
        <div class="action-area">
            <button id="openModalBtn" class="small-add-btn">＋ เพิ่มโพสต์</button>
        </div>
    </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>สร้างโพสต์ใหม่</h3>
            <div class="form-group">
                <label>เลือกรูปภาพ</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="form-group">
                <label>ข้อความ</label>
                <textarea id="textInput" rows="3" placeholder="เล่าเรื่องราววันนี้..."></textarea>
            </div>
            <div class="form-group">
                <label>วันที่</label>
                <input type="date" id="dateInput">
            </div>
            <button id="saveBtn" class="save-btn">บันทึกข้อมูล</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
