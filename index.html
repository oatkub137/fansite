<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>For My Love 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap&subset=thai" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Kanit', sans-serif;
      background: linear-gradient(180deg,#ffe6f0,#ffe6f0);
      text-align:center;
    }

    h1{
      margin-top:30px;
      color:#666;
      font-family:'Kanit', sans-serif;
    }

    .card{
      width:90%;
      max-width:700px;
      margin:30px auto;
      padding:20px;
      border-radius:25px;
      background:white;
      box-shadow:0 10px 25px rgba(255,105,135,0.2);
      display:flex;
      gap:20px;
      align-items:center;
      font-family:'Kanit', sans-serif;
    }

    /* 🔥 กรอบรูปเส้นประสีชมพูวิ่งช้าๆ */
    .photos{
      width:45%;
      padding:10px;
      border-radius:25px;
      position:relative;
    }

    .photos::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:25px;
      padding:4px;
      border:4px dashed #ff8fb1;
      animation:borderRun 6s linear infinite;
      pointer-events:none;
    }

    @keyframes borderRun{
      0%{ border-color:#ff8fb1; }
      50%{ border-color:#ff6fa3; }
      100%{ border-color:#ff8fb1; }
    }

    .photos img{
      width:100%;
      border-radius:20px;
      display:block;
    }

    .right{
      width:55%;
    }

    input{
      width:90%;
      padding:10px;
      border-radius:15px;
      border:none;
      background:#ffe6f0;
      text-align:center;
      font-size:18px;
      font-family:'Kanit', sans-serif;
    }

    .hint{
      font-family:'Kanit', sans-serif;
      margin-bottom:10px;
      color:#777;
    }

    button{
      padding:15px;
      border-radius:15px;
      border:none;
      background: linear-gradient(145deg,#ff8fb1,#ff6f9c);
      color:white;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 5px 10px rgba(255,105,135,0.3);
      font-family:'Kanit', sans-serif;
      transition:0.15s;
    }

    button:active{
      transform:scale(0.95);
    }

    .keypad{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:15px;
    }
  </style>
</head>

<body>

<h1>🔐 Enter our password</h1>

<div class="card">
  <div class="photos">
    <img src="img/couple.jpg">
  </div>

  <div class="right">
    <input type="password" id="password" readonly>
    <p class="hint">รหัสลับ 4 หลัก</p>

    <div class="keypad">
      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>
      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>
      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button onclick="clearPass()">ล้าง</button>
      <button onclick="add('0')">0</button>
      <button onclick="check()">ยืนยัน</button>
    </div>
  </div>
</div>

<script>
let pass="";
const correct="0907";

function add(n){ 
  pass+=n; 
  document.getElementById('password').value=pass; 
}

function clearPass(){ 
  pass=""; 
  document.getElementById('password').value=""; 
}

function check(){
  if(pass===correct){
    window.location.href='flower.html';
  }else{
    alert('รหัสผิดนะ 😢');
    clearPass();
  }
}
</script>

</body>
</html>
