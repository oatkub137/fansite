<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกมลับ 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(180deg,#fff0f5,#ffe6f0);
    text-align: center;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  h1 {
    margin-bottom: 30px;
    font-size: 28px;
  }

  .btn {
    width: 200px;
    height: 70px;
    border: none;
    border-radius: 20px;
    font-size: 20px;
    margin: 10px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 8px 20px rgba(255, 105, 180, 0.25);
  }

  .btn:active {
    transform: scale(0.95);
  }

  #yes {
    background: linear-gradient(135deg,#ff6fa5,#ff3d7f);
    color: white;
  }

  #no {
    background: #e0e0e0;
    color: #555;
    position: absolute;
  }
</style>
</head>

<body>

<h1 id="question">เธอรักเค้ามั้ย 💌</h1>

<button class="btn" id="yes">รัก 💖</button>
<button class="btn" id="no">ไม่รัก 😢</button>

<script>
let noTexts = [
  "ไม่รักจริงหรอ 😢",
  "คิดดีๆนะ...",
  "แน่ใจแล้วหรอ 🥺",
  "ไม่รักเค้าจริงๆเหรอ",
  "เค้างอนแล้วนะ...",
  "ยังไม่รักอีกเหรอ 😠"
];

let index = 0;

const noBtn = document.getElementById("no");
const question = document.getElementById("question");

noBtn.addEventListener("click", () => {
  question.innerText = noTexts[index % noTexts.length];
  index++;

  // หนีแบบน่ารักๆ
  let x = Math.random() * (window.innerWidth - 220);
  let y = Math.random() * (window.innerHeight - 100);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

document.getElementById("yes").addEventListener("click", () => {
  document.body.innerHTML = `
    <h1>เย้ 💖</h1>
    <p style="font-size:20px;">เค้าก็รักเธอเหมือนกันนะ อยู่ด้วยกันนานๆเลย 💕</p>
  `;
});
</script>

</body>
</html>
